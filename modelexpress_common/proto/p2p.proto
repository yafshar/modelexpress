syntax = "proto3";

package model_express.p2p;

// P2P Metadata Service for coordinating NIXL/RDMA transfers between vLLM instances.
// The server stores model metadata keyed by mx_source_id (a hash of SourceIdentity).
// Clients query for existing sources and publish their own metadata.
service P2pService {
  // Publish model metadata - called by client after loading model weights
  rpc PublishMetadata(PublishMetadataRequest) returns (PublishMetadataResponse);

  // List available source workers - lightweight, no tensor metadata.
  // Returns one SourceInstanceRef per worker; clients filter by worker_rank
  // to find matching peers and then call GetMetadata for the chosen one.
  rpc ListSources(ListSourcesRequest) returns (ListSourcesResponse);

  // Fetch full tensor metadata for one specific worker (MB-scale).
  // Call this after filtering ListSources results by worker_rank.
  rpc GetMetadata(GetMetadataRequest) returns (GetMetadataResponse);

  // Update source status - called by source after NIXL registration and warmup
  rpc UpdateStatus(UpdateStatusRequest) returns (UpdateStatusResponse);
}

// ============================================================================
// Source Identity
// ============================================================================

// Inference backend framework
enum BackendFramework {
  BACKEND_FRAMEWORK_UNKNOWN = 0;
  BACKEND_FRAMEWORK_VLLM = 1;
  BACKEND_FRAMEWORK_SGLANG = 2;
  BACKEND_FRAMEWORK_TRT_LLM = 3;
}

// Type of reusable material the source is serving.
enum MxSourceType {
  MX_SOURCE_TYPE_WEIGHTS = 0;             // Base model weights (default)
  MX_SOURCE_TYPE_LORA = 1;                // LoRA adapter weights
  MX_SOURCE_TYPE_CUDA_GRAPH = 2;          // CUDA graph artifacts
  MX_SOURCE_TYPE_TORCH_COMPILE_CACHE = 3; // torch.compile cache files
  MX_SOURCE_TYPE_TRITON_CACHE = 4;        // Triton cache files
  MX_SOURCE_TYPE_DEEP_GEMM_CACHE = 5;     // DeepGEMM kernel cache files
}

// All fields that affect source compatibility for reusable model material.
// Source-type-specific fields are populated only by the source types that need
// them; empty optional fields are ignored by current source-id canonicalization.
// The server computes SHA256(canonical_json(identity)) and takes the first
// 16 hex chars as the mx_source_id used to key metadata storage.
message SourceIdentity {
  // ModelExpress version (e.g., "0.3.0"). Ensures format compatibility across upgrades.
  string mx_version = 1;

  // Type of tensors being served
  MxSourceType mx_source_type = 2;

  // Model name (e.g., "deepseek-ai/DeepSeek-V3")
  string model_name = 3;

  // Inference framework
  BackendFramework backend_framework = 4;

  // Tensor parallel degree
  uint32 tensor_parallel_size = 5;

  // Pipeline parallel degree
  uint32 pipeline_parallel_size = 6;

  // Expert parallel degree (MoE models)
  uint32 expert_parallel_size = 7;

  // Weight dtype (e.g., "bfloat16", "float8_e4m3fn")
  string dtype = 8;

  // Quantization method (e.g., "fp8", "awq", "gptq", or empty)
  string quantization = 9;

  // Escape hatch for framework-specific config
  map<string, string> extra_parameters = 10;

  // Content-addressed revision of the model weights (e.g., HuggingFace
  // commit SHA, S3 object version, or any deployer-provided version
  // string). When populated, two sources with identical SourceIdentity
  // are guaranteed to have bit-identical weight bytes, which lets
  // decentralized modes (no central coordinator) use mx_source_id as a
  // full content check. Empty string means "unknown revision" and is
  // compatible with older publishers that pre-date this field.
  string revision = 11;

  // Optional source-type-scoped compatibility fields for file-backed artifacts.
  // Empty fields are ignored by current source-id canonicalization so existing
  // weight identities keep stable mx_source_id values.

  // Backend framework version (for example vLLM, SGLang, or TRT-LLM version).
  string backend_framework_version = 12;

  // PyTorch version used to produce framework cache artifacts.
  string torch_version = 13;

  // CUDA toolkit/runtime version relevant to generated cache artifacts.
  string cuda_version = 14;

  // Triton compiler/runtime version relevant to Triton cache artifacts.
  string triton_version = 15;

  // GPU architecture or capability (for example "sm90" or "9.0").
  string gpu_arch = 16;

  // Digest of source-type-specific compile/cache configuration not otherwise
  // represented by explicit fields.
  string compile_config_digest = 17;
}

// ============================================================================
// Tensor Descriptors
// ============================================================================

message TensorDescriptor {
  // Tensor name (e.g., "model.layers.0.self_attn.q_proj.weight")
  string name = 1;

  // GPU memory address
  uint64 addr = 2;

  // Size in bytes
  uint64 size = 3;

  // GPU device ID (0-7 for 8-GPU setup)
  uint32 device_id = 4;

  // Data type (e.g., "float16", "bfloat16")
  string dtype = 5;
}

// Small discovery summary for file-backed artifact sources. This does not carry
// full file or chunk manifests, and it does not carry lifecycle status.
// Readiness/staleness is source-record scoped and lives in WorkerMetadata.status
// so ListSources(status_filter=READY) works uniformly for tensor and artifact
// sources. Targets use WorkerService manifest header/page RPCs for the sealed
// manifest before any byte-transfer path.
message ArtifactSourceMetadata {
  // Digest of the canonical sealed artifact manifest.
  string artifact_id = 1;

  // Total artifact bytes across all manifest files.
  uint64 total_size = 2;

  // Number of files in the sealed artifact manifest.
  uint32 file_count = 3;

  // Number of transfer chunks in the sealed artifact manifest.
  uint32 chunk_count = 4;
}

// Tensor source payload for the source_payload migration. Writers populate this
// field; readers fall back to WorkerMetadata.tensors for old metadata.
message TensorSourceMetadata {
  repeated TensorDescriptor tensors = 1;
}

// Sealed file-backed artifact manifest. The artifact_id in
// ArtifactSourceMetadata and WorkerService artifact manifest responses is
// SHA-256 over the ModelExpress canonical artifact manifest JSON, encoded as
// lowercase hex without an algorithm prefix. Because manifest file paths are
// canonical absolute install paths, the artifact_id is install-path-specific,
// not only file-content-specific.
//
// The manifest separates file metadata from transfer chunk metadata. `files` is
// a stable table of all sealed files, sorted by manifest path; file_index is the
// zero-based index into that table. `chunks` is a flat table of fixed-size
// transfer ranges, ordered by file_index and then file_offset; chunk_index is
// the zero-based index into that flat table. Each chunk points back to its
// containing file with file_index and describes the byte range [file_offset,
// file_offset + length) within that file. Empty files are represented only in
// the file table and do not have transfer chunks.
message ArtifactManifest {
  uint32 manifest_version = 1;
  MxSourceType mx_source_type = 2;
  // Artifact byte chunk size. Builders reject zero and values above the
  // implementation maximum to avoid huge contiguous transfer buffers.
  uint64 chunk_size = 3;

  // Stable file table for the sealed snapshot. The full file table is returned
  // by GetArtifactManifestHeader so targets can plan install paths without
  // paginating by file count.
  repeated ArtifactManifestFile files = 4;

  // Flat chunk table for artifact transfer. Large manifests are served through
  // GetArtifactManifestChunks pages keyed by chunk_index.
  repeated ArtifactManifestChunk chunks = 5;
}

message ArtifactManifestFile {
  // File index used by ArtifactManifestChunk.file_index.
  uint32 file_index = 1;

  // Canonical absolute publisher path using "/" separators. Targets may
  // rewrite this to a target-local staging path after validating the sealed
  // source manifest.
  string path = 2;

  // File size in bytes.
  uint64 size = 3;

  // CRC32C checksum of the file bytes, lowercase hex without a prefix.
  string checksum = 4;
}

message ArtifactManifestChunk {
  // Globally ordered chunk index within the artifact manifest.
  uint32 chunk_index = 1;

  // ArtifactManifestFile.file_index for the file containing this chunk.
  uint32 file_index = 2;

  // Byte offset within the file.
  uint64 file_offset = 3;

  // Chunk length in bytes.
  uint64 length = 4;

  // CRC32C checksum of the chunk bytes, lowercase hex without a prefix.
  string checksum = 5;
}

// ============================================================================
// Worker Metadata
// ============================================================================

// Source lifecycle status
enum SourceStatus {
  SOURCE_STATUS_UNKNOWN = 0;        // uninitialized (proto3 zero default)
  SOURCE_STATUS_INITIALIZING = 1;  // publishing metadata
  SOURCE_STATUS_READY = 2;         // ready for transfers
  SOURCE_STATUS_STALE = 3;         // source gone, metadata may be stale
}

message WorkerMetadata {
  // Worker rank (GPU index within the instance)
  uint32 worker_rank = 1;

  // Backend-specific metadata for establishing transfers.
  // NIXL: serialized agent metadata for RDMA connections.
  // TransferEngine: Mooncake session ID ("ip:port").
  oneof backend_metadata {
    bytes nixl_metadata = 2;
    string transfer_engine_session_id = 10;
  }

  // Deprecated: use source_payload.tensor_source. Readers keep this only as a
  // fallback for metadata published by old writers.
  repeated TensorDescriptor tensors = 3 [deprecated = true];

  // Worker lifecycle status
  SourceStatus status = 4;

  // Timestamp of last status update (unix millis)
  int64 updated_at = 5;

  // P2P metadata exchange fields (opt-in via MX_P2P_METADATA=1).
  // When populated, targets fetch NIXL metadata and tensor manifests
  // directly from the source worker instead of from the central server.

  // host:port where NIXL listen thread accepts incoming metadata fetches
  string metadata_endpoint = 6;

  // NIXL agent name (used by targets to identify the remote agent)
  string agent_name = 7;

  // host:port for the worker's gRPC WorkerService, used for tensor manifests,
  // artifact manifests, and artifact chunk transfer coordination.
  string worker_grpc_endpoint = 8;

  // Runtime accelerator family for compatibility filtering (e.g. "cuda").
  // This is runtime metadata, not SourceIdentity hash material. Empty means
  // unknown and must be accepted for backward compatibility with old writers.
  string accelerator = 9;

  // Source-type-specific bounded metadata. This selects the metadata payload
  // shape, not a transfer endpoint. Readers should prefer tensor_source over
  // deprecated tensors when both are present, and fall back to tensors for old
  // writers.
  oneof source_payload {
    TensorSourceMetadata tensor_source = 20;
    ArtifactSourceMetadata artifact_source = 21;
  }
}

// ============================================================================
// Worker Service (P2P manifest exchange)
// ============================================================================

// Per-worker gRPC service for direct manifest retrieval. Sources start this
// service when MX_P2P_METADATA=1. Targets call GetTensorManifest for tensor
// descriptors or artifact manifest RPCs for sealed file-backed artifacts.
// Artifact bytes move through NIXL; PrepareArtifactChunk only creates a
// source-side registered DRAM range and returns its transfer descriptor.
service WorkerService {
  rpc GetTensorManifest(GetTensorManifestRequest) returns (GetTensorManifestResponse);
  rpc GetArtifactManifestHeader(GetArtifactManifestHeaderRequest) returns (GetArtifactManifestHeaderResponse);
  rpc GetArtifactManifestChunks(GetArtifactManifestChunksRequest) returns (GetArtifactManifestChunksResponse);
  rpc PrepareArtifactChunk(PrepareArtifactChunkRequest) returns (PrepareArtifactChunkResponse);
  rpc ReleaseArtifactChunk(ReleaseArtifactChunkRequest) returns (ReleaseArtifactChunkResponse);
}

message GetTensorManifestRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;
}

message GetTensorManifestResponse {
  repeated TensorDescriptor tensors = 1;
  // Echoed mx_source_id for confirmation
  string mx_source_id = 2;

  // Self-describing worker info, populated so a single GetTensorManifest
  // round-trip is enough to open a NIXL transfer. Required for deployments
  // with no central coordinator (e.g., decentralized, K8s-Service-routed)
  // where the caller never saw a ListSources/GetMetadata response.

  // host:port of this worker's NIXL listen thread
  string metadata_endpoint = 3;

  // NIXL agent name for the serving worker
  string agent_name = 4;

  // Rank of the serving worker (for rank-matched transfers)
  uint32 worker_rank = 5;

  // Runtime accelerator family for compatibility filtering (e.g. "cuda").
  // Empty means unknown and must be accepted for backward compatibility.
  string accelerator = 6;
}

message GetArtifactManifestHeaderRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;

  // Optional artifact_id from ArtifactSourceMetadata for validation.
  string artifact_id = 2;
}

message GetArtifactManifestHeaderResponse {
  // Echoed mx_source_id for confirmation.
  string mx_source_id = 1;

  // SHA-256 digest of the canonical sealed artifact manifest.
  string artifact_id = 2;

  uint32 manifest_version = 3;
  MxSourceType mx_source_type = 4;
  uint64 total_size = 5;
  uint32 file_count = 6;
  uint32 chunk_count = 7;

  // Artifact byte chunk size from the sealed manifest. Returned in the header
  // so targets can reconstruct and verify the manifest identity after fetching
  // chunk pages.
  uint64 chunk_size = 8;

  // Self-describing worker info, matching GetTensorManifestResponse.
  string metadata_endpoint = 9;
  string agent_name = 10;
  uint32 worker_rank = 11;

  // File metadata is fetched as one table in the header; chunk metadata is
  // paged separately. Very high file-count artifacts may need a future paged
  // file-table RPC.
  repeated ArtifactManifestFile files = 12;
}

message GetArtifactManifestChunksRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;

  // Optional artifact_id from ArtifactSourceMetadata for validation.
  string artifact_id = 2;

  // First global chunk index to return.
  uint32 start_chunk_index = 3;

  // Maximum chunks to return. Zero means server default.
  uint32 max_chunks = 4;
}

message GetArtifactManifestChunksResponse {
  // Echoed mx_source_id for confirmation.
  string mx_source_id = 1;

  // SHA-256 digest of the canonical sealed artifact manifest.
  string artifact_id = 2;

  // First global chunk index in this page.
  uint32 start_chunk_index = 3;

  repeated ArtifactManifestChunk chunks = 4;

  // Empty when this is the last page; otherwise the decimal string form of the
  // next start_chunk_index.
  string next_page_token = 5;
}

message ArtifactChunkTransferDescriptor {
  // Registered source DRAM buffer address for the prepared chunk.
  uint64 addr = 1;

  // Prepared range length in bytes.
  uint64 length = 2;

  // NIXL device id for the prepared DRAM range.
  uint32 device_id = 3;
}

message PrepareArtifactChunkRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;

  // Optional artifact_id from ArtifactSourceMetadata for validation.
  string artifact_id = 2;

  // Global chunk index to fetch.
  uint32 chunk_index = 3;
}

message PrepareArtifactChunkResponse {
  // Echoed mx_source_id for confirmation.
  string mx_source_id = 1;

  // SHA256 digest of the canonical sealed artifact manifest.
  string artifact_id = 2;

  // Lease that keeps the source-side registered range alive until released.
  string lease_id = 3;

  // Metadata for the prepared chunk.
  ArtifactManifestChunk chunk = 4;

  // NIXL DRAM source descriptor for this chunk.
  ArtifactChunkTransferDescriptor source = 5;

  // NIXL metadata for the source agent after this chunk has been prepared.
  // This describes agent registration state, not one byte range.
  bytes source_metadata = 6;
}

message ReleaseArtifactChunkRequest {
  // mx_source_id for validation (catches stale discovery)
  string mx_source_id = 1;

  // Optional artifact_id from ArtifactSourceMetadata for validation.
  string artifact_id = 2;

  // Lease returned by PrepareArtifactChunk.
  string lease_id = 3;
}

message ReleaseArtifactChunkResponse {
  // Echoed mx_source_id for confirmation.
  string mx_source_id = 1;

  // SHA256 digest of the canonical sealed artifact manifest.
  string artifact_id = 2;

  // Released chunk metadata.
  ArtifactManifestChunk chunk = 3;
}

// ============================================================================
// Publish Metadata
// ============================================================================

message PublishMetadataRequest {
  // Source identity — the server computes mx_source_id from this
  SourceIdentity identity = 1;

  // Metadata for this worker (one call per worker)
  WorkerMetadata worker = 2;

  // Unique identifier for this running instance (UUID).
  // Differentiates multiple replicas with identical SourceIdentity.
  // If empty, the server rejects the request.
  string worker_id = 3;
}

message PublishMetadataResponse {
  bool success = 1;
  string message = 2;
  // Computed 16-char hex key returned to client for use in subsequent calls
  string mx_source_id = 3;
  // Echoed worker_id for confirmation
  string worker_id = 4;
}

// ============================================================================
// List Sources
// ============================================================================

// Reference to one worker in one available source instance (lightweight — no tensor metadata).
// One entry is emitted per worker, so clients can match on worker_rank without calling GetMetadata.
message SourceInstanceRef {
  // Computed 16-char hex source ID
  string mx_source_id = 1;

  // Unique identifier for this running instance
  string worker_id = 2;

  // Human-readable model name
  string model_name = 3;

  // Global rank of this worker within the instance.
  // Clients filter on this field to find a peer with a matching rank.
  uint32 worker_rank = 4;
}

message ListSourcesRequest {
  // Filter by source identity — server computes mx_source_id.
  // If not set, instances across all sources are returned.
  SourceIdentity identity = 1;

  // Filter by worker status. Not set = return workers in all statuses.
  optional SourceStatus status_filter = 2;
}

message ListSourcesResponse {
  repeated SourceInstanceRef instances = 1;
}

// ============================================================================
// Get Metadata
// ============================================================================

message GetMetadataRequest {
  // mx_source_id from a ListSourcesResponse or PublishMetadataResponse
  string mx_source_id = 1;

  // worker_id from a ListSourcesResponse or PublishMetadataResponse
  string worker_id = 2;
}

message GetMetadataResponse {
  // Whether the requested worker was found
  bool found = 1;

  // Metadata for the requested worker (MB-scale; only fetched on demand)
  WorkerMetadata worker = 2;

  // Echoed mx_source_id
  string mx_source_id = 3;

  // Echoed worker_id
  string worker_id = 4;
}

// ============================================================================
// Status Coordination
// ============================================================================

message UpdateStatusRequest {
  // mx_source_id returned from PublishMetadata
  string mx_source_id = 1;

  // Worker rank (GPU index)
  uint32 worker_rank = 2;

  // New status
  SourceStatus status = 3;

  // worker_id returned from PublishMetadata
  string worker_id = 4;
}

message UpdateStatusResponse {
  bool success = 1;
  string message = 2;
}
